.tool-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.ibadge-sm{width:38px;height:38px;border-radius:10px;background:#0D1B2A;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.tool-tag{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:700}
.tc-ca{background:#E6F7F1;color:#0A6644;border:1px solid #B2DFD0}
.tc-us{background:#EEF4FD;color:#1A4E8A;border:1px solid #BDD0F0}

.calc-btn{display:inline-flex;align-items:center;gap:5px;background:#1DB584;color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none}
.calc-btn:hover{background:#18a073}
.calc-btn svg{width:11px;height:11px}

.empty-state{text-align:center;padding:80px 20px;color:#9BA8B5}
.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.4}
.empty-state p{font-size:15px}

@media(max-width:1200px){.hub-body{padding:36px 48px 60px}.hub-hero{padding:44px 48px 48px}.filter-bar{padding:0 48px}}

var CAT_ORDER=['Mortgage','Financial Planning','Investing','Retirement','Loans','Tax & Salary'];

/* ── Render ────────────────────────────────────────────── */
function regionTag(r){
  if(r==='ca')return '<span class="tool-tag tc-ca">Canada only</span>';
  if(r==='us')return '<span class="tool-tag tc-us">USA only</span>';
  return '<span class="tool-tag tc-both">CA + US</span>';
}
var arrow='<svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6H9.5M6.5 3L9.5 6L6.5 9" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function buildCard(c){
  return '<a href="'+c.f+'" class="tool-card">'
    +'<div class="tool-card-hd">'
    +'<div class="ibadge-sm"><svg viewBox="0 0 17 17" fill="none">'+c.icon+'</svg></div>'
    +'</div>'
    +'<div class="tool-name">'+c.n+'</div>'
    +'<div class="tool-desc">'+c.desc+'</div>'
    +'<div class="tool-footer" style="justify-content:flex-end">'
    +'<span class="calc-btn">Open Calculator '+arrow+'</span>'
    +'</div></a>';
}

function render(activeCat){
  var body=document.getElementById('hub-body');
  body.innerHTML='';
  var cats=activeCat==='all'?CAT_ORDER:[activeCat];
  var total=0;
  cats.forEach(function(cat){
    var items=CALCS.filter(function(c){return c.cat===cat;});
    if(!items.length)return;
    total+=items.length;
    var sec=document.createElement('div');
    sec.className='cat-section';
    sec.id='cat-'+cat.replace(/\s+/g,'-').toLowerCase();
    sec.innerHTML='<div class="cat-header">'
      +'<div class="cat-title">'+cat+'</div>'
      +'<div class="cat-count">'+items.length+' calculators</div>'
      +'<div class="cat-divider"></div>'
      +'</div>'
      +'<div class="hub-grid">'+items.map(buildCard).join('')+'</div>';
    body.appendChild(sec);
  });
}

function filterCat(cat,btn){
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render(cat);
  // No scroll — cards update in place, banner stays visible
}

/* ── URL hash filter on load ────────────────────────────── */
function initFilter(){
  var hash=window.location.hash.replace('#','');
  var catMap={
    'mortgage':'Mortgage',
    'financial-planning':'Financial Planning',
    'investing':'Investing',
    'retirement':'Retirement',
    'loans':'Loans',
    'tax-salary':'Tax & Salary',
    // Stage shorthand
    'starting':'Financial Planning',
    'building':'Investing',
    'planning-retirement':'Retirement'
  };
  var activeCat='all';
  if(hash&&catMap[hash]){
    activeCat=catMap[hash];
    // Activate correct filter button
    document.querySelectorAll('.fbtn').forEach(function(b){
      b.classList.remove('active');
      if(b.dataset.cat===activeCat)b.classList.add('active');
    });
  }
  render(activeCat);
}
window.addEventListener('DOMContentLoaded',initFilter);
</script>
